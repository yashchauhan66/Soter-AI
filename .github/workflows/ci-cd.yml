# ═══════════════════════════════════════════════════════════════════════════════
# Soter Guard — CI/CD Pipeline (Unified)
# ═══════════════════════════════════════════════════════════════════════════════
# On push to main:
#   1. Build & Typecheck  (GitHub runner)
#   2. Run all tests      (GitHub runner)
#   3. Docker Build+Push  (GitHub runner → Docker Hub)
#   4. Deploy on EC2      (SSH → pull image → restart)
#
# On PR to main:
#   1. Build & Typecheck  (fast feedback only)
#   2. Run all tests
# ═══════════════════════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/soter

  # ── CI-only env vars (not production secrets) ──
  CI: "true"
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/soter_ci?schema=public
  AUTH_SECRET: ci-auth-secret-at-least-thirty-two-characters
  NEXTAUTH_SECRET: ci-auth-secret-at-least-thirty-two-characters
  NEXTAUTH_URL: http://127.0.0.1:3000
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
  API_KEY_PEPPER: ci-api-key-pepper-at-least-thirty-two-characters
  WEBHOOK_WORKER_TOKEN: ci-webhook-worker-token-at-least-thirty-two-chars
  REPORT_WORKER_TOKEN: ci-report-worker-token-at-least-thirty-two-chars
  WEBHOOK_SECRET_PEPPER: ci-webhook-pepper-at-least-thirty-two-characters
  LOCAL_SECRET_STORE_KEY: ci-local-secret-key-at-least-thirty-two-characters
  SCIM_TOKEN_PEPPER: ci-scim-token-pepper-at-least-thirty-two-characters
  AUDIT_EXPORT_SECRET: ci-audit-export-secret-at-least-thirty-two-characters
  REPORT_SIGNING_SECRET: ci-report-signing-secret-at-least-thirty-two-characters
  EMAIL_PROVIDER: mock
  SECRET_STORE_PROVIDER: local
  VECTOR_PROVIDER: memory
  VECTOR_ALLOW_LOCAL_EMBEDDINGS: "true"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1: Build & Typecheck
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: 🔨 Build & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soter_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d soter_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Build application
        run: npm run build

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2: Run Tests
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soter_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d soter_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3: Docker Build & Push to Docker Hub
  # ═══════════════════════════════════════════════════════════════════════════
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify pushed image
        run: |
          echo "✅ Docker image pushed successfully!"
          echo "   Image: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
          echo "   Image: ${{ env.DOCKER_IMAGE }}:latest"

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 4: Deploy to EC2
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload .env.production to EC2
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          if [ -z "$ENV_PRODUCTION" ]; then
            echo "❌ ENV_PRODUCTION secret is not set!"
            echo "   Go to GitHub → Settings → Secrets → Add ENV_PRODUCTION"
            exit 1
          fi
          printf '%s\n' "$ENV_PRODUCTION" > /tmp/soter-env-production
          scp /tmp/soter-env-production ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/soter-env-production
          rm -f /tmp/soter-env-production

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash -s << 'DEPLOY_SCRIPT'
            set -e

            # ── Fix PATH for non-interactive SSH ───────────────────
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH"
            [ -f ~/.bashrc ] && source ~/.bashrc 2>/dev/null || true
            [ -f ~/.profile ] && source ~/.profile 2>/dev/null || true

            REPO_DIR="/home/${{ secrets.EC2_USER }}/soter-guard"
            DOCKER_USERNAME="$(printf '%s' "${{ secrets.DOCKER_USERNAME }}" | tr -d '[:space:]')"
            DOCKER_TAG="${DOCKER_USERNAME}/soter"
            COMMIT_SHA="${{ github.sha }}"

            echo "═══════════════════════════════════════════════════"
            echo "  Soter Guard — Deploying to EC2"
            echo "  Commit: ${COMMIT_SHA}"
            echo "═══════════════════════════════════════════════════"

            # ── Step 1: Pull latest code (for docker-compose.yml) ──
            echo ""
            echo "[1/5] Pulling latest code..."
            if [ -d "$REPO_DIR/.git" ]; then
              cd "$REPO_DIR"
              git stash 2>/dev/null || true
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/yashchauhan66/Ai-Security-Guard.git
              git pull --rebase
              echo "  ✅ Repo updated"
            else
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/yashchauhan66/Ai-Security-Guard.git "$REPO_DIR"
              cd "$REPO_DIR"
              echo "  ✅ Repo cloned"
            fi

            # ── Step 2: Setup .env.production ──────────────────────
            echo ""
            echo "[2/5] Setting up environment..."
            if [ -f /tmp/soter-env-production ]; then
              mv /tmp/soter-env-production "$REPO_DIR/.env.production"
              chmod 600 "$REPO_DIR/.env.production"
              echo "  ✅ .env.production updated"
            elif [ ! -f "$REPO_DIR/.env.production" ]; then
              echo "  ❌ ERROR: .env.production not found!"
              exit 1
            fi

            # ── Step 3: Login to Docker Hub ────────────────────────
            echo ""
            echo "[3/5] Logging in to Docker Hub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${DOCKER_USERNAME}" --password-stdin
            echo "  ✅ Docker Hub logged in"

            # ── Step 4: Pull latest Docker image ───────────────────
            echo ""
            echo "[4/5] Pulling latest Docker image..."
            docker pull "${DOCKER_TAG}:${COMMIT_SHA}"
            docker tag "${DOCKER_TAG}:${COMMIT_SHA}" "${DOCKER_TAG}:latest"
            echo "  ✅ Image pulled: ${DOCKER_TAG}:${COMMIT_SHA}"

            # ── Step 5: Deploy containers ──────────────────────────
            echo ""
            echo "[5/5] Deploying containers..."
            export DOCKER_IMAGE="${DOCKER_TAG}"

            # Detect docker compose (V2 plugin or V1 binary)
            COMPOSE=""
            if docker compose version >/dev/null 2>&1 && docker compose --help 2>/dev/null | grep -q -- "--env-file"; then
              COMPOSE="docker compose"
            elif command -v docker-compose >/dev/null 2>&1 && docker-compose --help 2>/dev/null | grep -q -- "--env-file"; then
              COMPOSE="docker-compose"
            elif [ -x /usr/local/bin/docker-compose ] && /usr/local/bin/docker-compose --help 2>/dev/null | grep -q -- "--env-file"; then
              COMPOSE="/usr/local/bin/docker-compose"
            elif [ -x /usr/bin/docker-compose ] && /usr/bin/docker-compose --help 2>/dev/null | grep -q -- "--env-file"; then
              COMPOSE="/usr/bin/docker-compose"
            fi

            if [ -n "$COMPOSE" ]; then
              # ── Deploy via docker compose ──
              echo "  Using compose: $COMPOSE"
              $COMPOSE --env-file .env.production -f docker-compose.prod.yml up -d --force-recreate app redis qdrant
            else
              # ── Fallback: deploy via plain docker run ──
              echo "  docker compose not found — using docker run directly"

              # Create shared network
              docker network create soter-net 2>/dev/null || true

              # Stop old containers
              docker rm -f soter-redis soter-qdrant soter-app 2>/dev/null || true

              # Start Redis
              echo "  Starting Redis..."
              docker run -d \
                --name soter-redis \
                --network soter-net \
                --restart unless-stopped \
                -v soter-redis-data:/data \
                redis:7-alpine \
                redis-server --appendonly yes

              # Start Qdrant
              echo "  Starting Qdrant..."
              docker run -d \
                --name soter-qdrant \
                --network soter-net \
                --restart unless-stopped \
                -v soter-qdrant-data:/qdrant/storage \
                qdrant/qdrant:v1.14.1

              # Wait for dependencies to be ready
              echo "  Waiting for Redis & Qdrant..."
              sleep 5

              # Start App
              echo "  Starting App..."
              docker run -d \
                --name soter-app \
                --network soter-net \
                --restart unless-stopped \
                --env-file "$REPO_DIR/.env.production" \
                -e NODE_ENV=production \
                -e VECTOR_PROVIDER=qdrant \
                -e QDRANT_URL=http://soter-qdrant:6333 \
                -e REDIS_URL=redis://soter-redis:6379 \
                -p 0.0.0.0:3000:3000 \
                "${DOCKER_TAG}:latest"
            fi

            # Clean up old images
            docker image prune -a --filter "until=24h" --force 2>/dev/null || true

            # Health check (wait up to 60 seconds)
            echo ""
            echo "  Waiting for health check..."
            HTTP_CODE="000"
            for i in $(seq 1 12); do
              sleep 5
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/api/health 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "  ✅ Health check PASSED (attempt $i)"
                break
              fi
              echo "  Attempt $i: HTTP $HTTP_CODE, retrying..."
            done

            if [ "$HTTP_CODE" != "200" ]; then
              echo "  ⚠️  Health check got HTTP $HTTP_CODE (app may still be starting)"
              if [ -n "$COMPOSE" ]; then
                $COMPOSE --env-file .env.production logs --tail=30 app
              else
                docker logs --tail=30 soter-app
              fi
            fi

            # Reload nginx if present
            if command -v nginx >/dev/null 2>&1; then
              echo ""
              echo "  Reloading nginx..."
              sudo nginx -t && sudo systemctl reload nginx && echo "  ✅ nginx reloaded" || echo "  ⚠️  nginx reload skipped"
            fi

            echo ""
            echo "═══════════════════════════════════════════════════"
            echo "  ✅ Deployment Complete!"
            echo "  Image: ${DOCKER_TAG}:${COMMIT_SHA}"
            echo "═══════════════════════════════════════════════════"
          DEPLOY_SCRIPT

      - name: Deployment Summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "   Image: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
          echo "   Server: ${{ secrets.EC2_HOST }}"
          echo "   Health: http://${{ secrets.EC2_HOST }}:3000/api/health"
