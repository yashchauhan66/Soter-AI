name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ##############################################################################
  # SDK: TypeScript (@soterai/core + middleware)
  ##############################################################################
  sdk-js:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/sdk/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: packages/sdk

      - name: Typecheck
        run: npm run typecheck
        working-directory: packages/sdk

      - name: Build
        run: npm run build
        working-directory: packages/sdk

      - name: Test
        run: npm test
        working-directory: packages/sdk

  sdk-middleware:
    name: Middleware Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        package:
          - langchain-middleware
          - llamaindex-middleware
          - vercel-ai-sdk-middleware

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: packages/${{ matrix.package }}

      - name: Typecheck
        run: npm run typecheck
        working-directory: packages/${{ matrix.package }}

      - name: Build
        run: npm run build
        working-directory: packages/${{ matrix.package }}

  ##############################################################################
  # SDK: Python (soter)
  ##############################################################################
  sdk-python:
    name: Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/python-sdk/pyproject.toml

      - name: Install dependencies
        run: |
          pip install -e "packages/python-sdk[dev]"
          pip install build twine

      - name: Lint with Ruff
        run: pip install ruff && ruff check packages/python-sdk/soter/ || true

      - name: Test
        run: python -m pytest packages/python-sdk/tests/ -q --timeout=30 -k "not e2e"

      - name: Build
        run: python -m build packages/python-sdk --outdir dist

      - name: Check package
        run: twine check dist/*

  ##############################################################################
  # Main App: Next.js (typecheck + tests + build)
  ##############################################################################
  app-verify:
    name: App Verify
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cyberrakshak_guard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cyberrakshak_guard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: "true"
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/cyberrakshak_guard?schema=public
      AUTH_SECRET: ci-auth-secret-at-least-thirty-two-characters
      NEXTAUTH_SECRET: ci-auth-secret-at-least-thirty-two-characters
      NEXTAUTH_URL: http://127.0.0.1:3101
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3101
      API_KEY_PEPPER: ci-api-key-pepper-at-least-thirty-two-characters
      WEBHOOK_SECRET_PEPPER: ci-webhook-pepper-at-least-thirty-two-characters
      LOCAL_SECRET_STORE_KEY: ci-local-secret-key-at-least-thirty-two-characters
      SCIM_TOKEN_PEPPER: ci-scim-token-pepper-at-least-thirty-two-characters
      AUDIT_EXPORT_SECRET: ci-audit-export-secret-at-least-thirty-two-characters
      REPORT_SIGNING_SECRET: ci-report-signing-secret-at-least-thirty-two-characters
      EMAIL_PROVIDER: mock
      VECTOR_PROVIDER: memory
      VECTOR_ALLOW_LOCAL_EMBEDDINGS: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Apply database migrations
        run: npm run db:deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

  ##############################################################################
  # Docker Build Verification
  ##############################################################################
  docker-verify:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [sdk-js, app-verify]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: soter/app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXTAUTH_SECRET=ci-build-secret-32-characters-long-for-test
            AUTH_SECRET=ci-build-secret-32-characters-long-for-test

  ##############################################################################
  # Publish npm Packages (on tag push)
  ##############################################################################
  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: [sdk-js, sdk-middleware]
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    strategy:
      matrix:
        package:
          - name: "@soterai/core"
            dir: packages/sdk
          - name: "@soterai/langchain-middleware"
            dir: packages/langchain-middleware
          - name: "@soterai/llamaindex-middleware"
            dir: packages/llamaindex-middleware
          - name: "@soterai/vercel-ai-sdk-middleware"
            dir: packages/vercel-ai-sdk-middleware

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install & Build
        run: |
          npm ci
          npm run build
        working-directory: ${{ matrix.package.dir }}

      - name: Publish to npm
        run: npm publish --access public
        working-directory: ${{ matrix.package.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  ##############################################################################
  # Publish PyPI (on tag push)
  ##############################################################################
  publish-pypi:
    name: Publish PyPI
    runs-on: ubuntu-latest
    needs: [sdk-python]
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          pip install build twine
          python -m build packages/python-sdk --outdir dist

      - name: Publish to PyPI
        run: twine upload dist/* --username __token__ --password ${{ secrets.PYPI_TOKEN }}

  ##############################################################################
  # Deploy to EC2 (on main push)
  ##############################################################################
  deploy-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [docker-verify]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY || 'soter/app' }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }} \
            --build-arg AUTH_SECRET=${{ secrets.AUTH_SECRET }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION || 'us-east-1' }} \
              | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            # Pull latest images
            cd /home/ubuntu/soter

            # Update docker-compose env from GitHub secrets
            cat > .env.production << 'ENVEOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            API_KEY_PEPPER=${{ secrets.API_KEY_PEPPER }}
            SOTER_API_KEY=${{ secrets.SOTER_API_KEY }}
            REDIS_URL=redis://redis:6379
            QDRANT_URL=http://qdrant:6333
            NODE_ENV=production
            ENVEOF

            # Pull and restart
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Health check
            for i in $(seq 1 15); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health || true)
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Attempt $i: got HTTP $STATUS, retrying..."
              sleep 5
            done
            echo "Health check failed"
            docker compose -f docker-compose.prod.yml logs --tail=50
            exit 1
