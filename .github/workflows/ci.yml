name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/soter-guard
  CI: "true"
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/cyberrakshak_guard?schema=public
  AUTH_SECRET: ci-auth-secret-at-least-thirty-two-characters
  NEXTAUTH_SECRET: ci-auth-secret-at-least-thirty-two-characters
  NEXTAUTH_URL: http://127.0.0.1:3101
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3101
  API_KEY_PEPPER: ci-api-key-pepper-at-least-thirty-two-characters
  WEBHOOK_WORKER_TOKEN: ci-webhook-worker-token-at-least-thirty-two-chars
  REPORT_WORKER_TOKEN: ci-report-worker-token-at-least-thirty-two-chars
  WEBHOOK_SECRET_PEPPER: ci-webhook-pepper-at-least-thirty-two-characters
  LOCAL_SECRET_STORE_KEY: ci-local-secret-key-at-least-thirty-two-characters
  SCIM_TOKEN_PEPPER: ci-scim-token-pepper-at-least-thirty-two-characters
  AUDIT_EXPORT_SECRET: ci-audit-export-secret-at-least-thirty-two-characters
  REPORT_SIGNING_SECRET: ci-report-signing-secret-at-least-thirty-two-characters
  EMAIL_PROVIDER: mock
  SECRET_STORE_PROVIDER: local
  VECTOR_PROVIDER: memory
  VECTOR_ALLOW_LOCAL_EMBEDDINGS: "true"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cyberrakshak_guard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cyberrakshak_guard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Apply database migrations
        run: npm run db:deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Build app
        run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cyberrakshak_guard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cyberrakshak_guard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npm run db:deploy

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload production env to EC2
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          if [ -z "$ENV_PRODUCTION" ]; then
            echo "ENV_PRODUCTION secret is not set. Add your full .env.production content as a GitHub Actions secret."
            exit 1
          fi
          printf '%s\n' "$ENV_PRODUCTION" > /tmp/soter-env-production
          scp /tmp/soter-env-production ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/soter-env-production

      - name: Build and deploy on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash -s << 'DEPLOY_SCRIPT'
            set -e

            REPO_DIR="/home/${{ secrets.EC2_USER }}/soter-guard"
            COMMIT_SHA="${{ github.sha }}"
            DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            DOCKER_TAG="${DOCKER_USERNAME}/soter-guard"

            if [ -d "$REPO_DIR/.git" ]; then
              cd "$REPO_DIR"
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/yashchauhan66/Ai-Security-Guard.git
              git pull --rebase
            else
              rm -rf "$REPO_DIR"
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/yashchauhan66/Ai-Security-Guard.git "$REPO_DIR"
              cd "$REPO_DIR"
            fi

            if [ -f /tmp/soter-env-production ]; then
              mv /tmp/soter-env-production "$REPO_DIR/.env.production"
              chmod 600 "$REPO_DIR/.env.production"
            fi

            test -f "$REPO_DIR/.env.production"

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker build \
              -t "${DOCKER_TAG}:${COMMIT_SHA}" \
              -t "${DOCKER_TAG}:latest" \
              .

            docker push "${DOCKER_TAG}:${COMMIT_SHA}"
            docker push "${DOCKER_TAG}:latest"

            export DOCKER_IMAGE="${DOCKER_TAG}"
            docker compose --env-file .env.production up -d --force-recreate redis qdrant app

            sleep 10
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/api/health 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" != "200" ]; then
              docker compose --env-file .env.production logs --tail=80 app
              exit 1
            fi
          DEPLOY_SCRIPT
