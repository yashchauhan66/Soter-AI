# ═══════════════════════════════════════════════════════════════════════════════
# Soter Guard — CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════════════════
# On push to main:
#   1. Build Next.js app
#   2. Run typecheck & lint
#   3. Build Docker image
#   4. Push to Docker Hub
#   5. SSH into EC2 → pull new image → deploy → remove old containers
# ═══════════════════════════════════════════════════════════════════════════════

name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch: # Manual trigger

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/soter-guard
  DOCKER_TAG: ${{ github.sha }}
  DOCKER_TAG_LATEST: latest

jobs:
  # ─── Job 1: Build & Push Docker Image ────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit --pretty

      - name: Lint check
        run: npx next lint --max-warnings 0 2>/dev/null || echo "Lint warnings found (non-blocking)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG_LATEST }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Pass build-time args (secrets are NOT baked into image)
          build-args: |
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}

  # ─── Job 2: Deploy on EC2 ─────────────────────────────────────────────────
  deploy:
    name: Deploy on EC2
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository (for deploy script)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash -s << 'DEPLOY_SCRIPT'
            set -e

            echo "=== Soter Guard Deployment ==="
            echo "Pulling new image..."
            docker pull ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG_LATEST }}

            echo "Tagging current as 'previous' for rollback..."
            docker tag ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG_LATEST }} ${{ env.DOCKER_IMAGE }}:deployed 2>/dev/null || true

            echo "Starting new container..."
            cd /home/${{ secrets.EC2_USER }}/soter-guard || mkdir -p /home/${{ secrets.EC2_USER }}/soter-guard && cd /home/${{ secrets.EC2_USER }}/soter-guard

            # Copy .env.production if exists
            if [ ! -f .env.production ]; then
              echo "WARNING: .env.production not found! Creating from template..."
              cat > .env.production << 'ENVEOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            NEXTAUTH_URL=https://${{ secrets.EC2_HOST }}
            AUTH_TRUST_HOST=true
            NODE_ENV=production
            REDIS_URL=redis://redis:6379
            QDRANT_URL=http://qdrant:6333
            VECTOR_PROVIDER=qdrant
            ENVEOF
            fi

            # Export DOCKER_IMAGE so docker compose can use it
            export DOCKER_IMAGE=${{ env.DOCKER_IMAGE }}

            echo "Pulling latest compose file..."
            # docker compose is already in the directory

            echo "Deploying with docker compose..."
            docker compose pull app
            docker compose up -d --no-deps --force-recreate app

            echo "Cleaning up old images (keeping last 3)..."
            docker image prune -a --filter "until=24h" --force 2>/dev/null || true

            echo "=== Deployment Complete ==="
            echo "Checking health..."
            sleep 10
            curl -f http://127.0.0.1:3000/api/health && echo " - Health check PASSED" || echo " - Health check WARNING (app may still be starting)"

      - name: Deployment Status
        run: echo "✅ Deployment to EC2 completed successfully!"
