# ═══════════════════════════════════════════════════════════════════════════════
# Soter Guard — CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════════════════
# On push to main:
#   1. Typecheck & lint on GitHub (fast feedback)
#   2. SSH into EC2 → git pull → build Docker image → push to Docker Hub → deploy
# ═══════════════════════════════════════════════════════════════════════════════
#
# Prerequisites (one-time setup on EC2):
#   - docker login  (Docker Hub credentials)
#   - .env.production created in the repo directory
#   - Repo cloned: git clone https://github.com/yashchauhan66/Ai-Security-Guard.git
#
# ═══════════════════════════════════════════════════════════════════════════════

name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/soter-guard

jobs:
  # ─── Job 1: Typecheck & Lint (fast feedback, no build) ───────────────────
  check:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit --pretty

      - name: Lint check
        run: npx next lint --max-warnings 0 2>/dev/null || echo "Lint warnings found (non-blocking)"

  # ─── Job 2: Build on EC2 → Push to Docker Hub → Deploy ──────────────────
  deploy:
    name: Build & Deploy on EC2
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload production env to EC2
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          if [ -z "$ENV_PRODUCTION" ]; then
            echo "ENV_PRODUCTION secret is not set. Add your full .env.production content as a GitHub Actions secret."
            exit 1
          fi
          printf '%s\n' "$ENV_PRODUCTION" > /tmp/soter-env-production
          scp /tmp/soter-env-production ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/soter-env-production

      - name: Build & Deploy via SSH
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash -s << 'DEPLOY_SCRIPT'
            set -e

            REPO_DIR="/home/${{ secrets.EC2_USER }}/soter-guard"
            COMMIT_SHA="${{ github.sha }}"
            # Strip any stray whitespace/newlines from the secret (a trailing
            # newline in DOCKER_USERNAME produces an invalid Docker tag reference)
            DOCKER_USERNAME="$(printf '%s' "${{ secrets.DOCKER_USERNAME }}" | tr -d '[:space:]')"
            DOCKER_TAG="${DOCKER_USERNAME}/soter-guard"

            echo "═══════════════════════════════════════════════════"
            echo "  Soter Guard — Deploy to EC2"
            echo "  Commit: ${COMMIT_SHA}"
            echo "═══════════════════════════════════════════════════"

            # ── Step 1: Pull latest code ─────────────────────────────────
            echo ""
            echo "[1/5] Pulling latest code..."
            if [ -d "$REPO_DIR" ]; then
              cd "$REPO_DIR"
              git stash 2>/dev/null || true
              # Refresh auth token (GITHUB_TOKEN expires between runs)
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/yashchauhan66/Ai-Security-Guard.git
              git pull --rebase
              echo "  ✅ Repo updated at ${REPO_DIR}"
            else
              echo "  Cloning fresh..."
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/yashchauhan66/Ai-Security-Guard.git "$REPO_DIR"
              cd "$REPO_DIR"
              echo "  ✅ Repo cloned at ${REPO_DIR}"
            fi

            if [ -f /tmp/soter-env-production ]; then
              mv /tmp/soter-env-production "$REPO_DIR/.env.production"
              chmod 600 "$REPO_DIR/.env.production"
              echo "  .env.production uploaded from GitHub secret"
            fi

            # ── Step 2: Verify .env.production exists ────────────────────
            echo ""
            echo "[2/5] Checking environment file..."
            if [ ! -f "$REPO_DIR/.env.production" ]; then
              echo "  ❌ ERROR: .env.production not found!"
              echo ""
              echo "  Create it manually:"
              echo "    ssh -i <your-key>.pem ubuntu@${{ secrets.EC2_HOST }}"
              echo "    cd $REPO_DIR"
              echo "    nano .env.production"
              echo ""
              echo "  Required vars: DATABASE_URL, NEXTAUTH_SECRET, AUTH_SECRET,"
              echo "  NEXTAUTH_URL, REDIS_URL, QDRANT_URL, VECTOR_PROVIDER"
              exit 1
            fi
            echo "  ✅ .env.production found"

            # ── Step 3: Log in to Docker Hub ─────────────────────────────
            echo ""
            echo "[3/5] Logging in to Docker Hub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${DOCKER_USERNAME}" --password-stdin
            echo "  ✅ Docker Hub logged in"

            # ── Step 4: Build Docker image ───────────────────────────────
            echo ""
            echo "[4/5] Building Docker image..."
            docker build \
              -t "${DOCKER_TAG}:${COMMIT_SHA}" \
              -t "${DOCKER_TAG}:latest" \
              -t "${DOCKER_TAG}:deployed" \
              .

            echo "  ✅ Image built: ${DOCKER_TAG}:${COMMIT_SHA}"

            # Push to Docker Hub
            echo ""
            echo "  Pushing to Docker Hub..."
            docker push "${DOCKER_TAG}:${COMMIT_SHA}"
            docker push "${DOCKER_TAG}:latest"
            docker push "${DOCKER_TAG}:deployed" 2>/dev/null || true
            echo "  ✅ Pushed to Docker Hub"

            # ── Step 5: Deploy with docker compose ───────────────────────
            echo ""
            echo "[5/5] Deploying with docker compose..."
            export DOCKER_IMAGE="${DOCKER_TAG}"
            # No pull needed — we just built the image locally
            docker compose --env-file .env.production up -d --force-recreate redis qdrant app

            echo ""
            echo "  Cleaning up old images..."
            docker image prune -a --filter "until=24h" --force 2>/dev/null || true

            # Health check
            echo ""
            echo "  Checking health..."
            sleep 10
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/api/health 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "  ✅ Health check PASSED (HTTP ${HTTP_CODE})"
            else
              echo "  ⚠️  Health check responded HTTP ${HTTP_CODE} (app may still be starting)"
            fi

            # Nginx reload
            echo ""
            echo "  Reloading nginx..."
            sudo nginx -t && sudo systemctl reload nginx && echo "  ✅ nginx reloaded" || echo "  ⚠️  nginx reload skipped"

            echo ""
            echo "═══════════════════════════════════════════════════"
            echo "  ✅ Deployment Complete!"
            echo "═══════════════════════════════════════════════════"

          DEPLOY_SCRIPT

      - name: Deployment Status
        run: |
          echo "✅ Deployment completed!"
          echo "   Check health: http://${{ secrets.EC2_HOST }}/api/health"
