[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "cyberrakshak-guard"
version = "0.1.0"
description = "Python client and helpers for the CyberRakshak Guard AI security gateway (OWASP LLM Top 10 aligned)."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
keywords = ["ai", "security", "owasp", "llm", "prompt-injection", "pii", "guard", "chatbot"]
authors = [{ name = "CyberRakshak" }]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Topic :: Security",
]
dependencies = []

[project.optional-dependencies]
# The SDK uses urllib from the stdlib by default. Install one of these for
# connection pooling / async; the client auto-detects an installed httpx.
http = ["httpx>=0.24"]
requests = ["requests>=2.28"]
fastapi = ["fastapi>=0.95"]
langchain = ["langchain-core>=0.1"]
dev = ["pytest>=7.0", "httpx>=0.24"]

[project.urls]
Homepage = "https://cyberrakshak.dev"
Documentation = "https://cyberrakshak.dev/docs/integrations/python"

[tool.setuptools.packages.find]
include = ["cyberrakshak_guard*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
