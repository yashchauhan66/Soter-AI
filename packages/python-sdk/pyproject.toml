[project]
name = "soter"
version = "0.2.1"
description = "Soter is a safety layer for AI chatbots, agents, RAG systems, and LLM applications."
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0"
authors = [{ name = "Yash Chauhan" }]
keywords = [
    "soter",
    "ai-chatbot",
    "llm-security",
    "jailbreak-detection",
    "pii-redaction",
    "chatbot-protection",
    "rag-security",
    "ai-safety",
    "ai-agents",
    "ai-security",
    "prompt-injection",
    "llm-guardrails",
    "chatbot-security",
    "rag",
    "langchain",
    "llamaindex",
    "fastapi",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
]
dependencies = ["requests>=2.31.0"]

[project.urls]
Homepage = "https://soter.dev"
Documentation = "https://soter.dev/docs/integrations/python"
Source = "https://github.com/soter/guard"

[project.optional-dependencies]
async = ["httpx>=0.24.0"]
fastapi = ["fastapi>=0.100.0"]
flask = ["flask>=2.2.0"]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "httpx>=0.24.0",
    "fastapi>=0.100.0",
    "flask>=2.2.0",
    "starlette>=0.27.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["soter*"]
