services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: cyberrakshak
      POSTGRES_USER: cyberrakshak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberrakshak"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.14.1
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file: ${APP_ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql://cyberrakshak:${POSTGRES_PASSWORD}@postgres:5432/cyberrakshak?schema=public
      VECTOR_PROVIDER: ${VECTOR_PROVIDER:-qdrant}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres: { condition: service_healthy }
      qdrant: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)})\""]
      interval: 30s
      timeout: 10s
      retries: 5

  webhook-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    command: ["npm", "run", "worker:webhooks"]
    env_file: ${APP_ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql://cyberrakshak:${POSTGRES_PASSWORD}@postgres:5432/cyberrakshak?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  background-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    command: ["npm", "run", "worker:background"]
    env_file: ${APP_ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql://cyberrakshak:${POSTGRES_PASSWORD}@postgres:5432/cyberrakshak?schema=public
      VECTOR_PROVIDER: ${VECTOR_PROVIDER:-qdrant}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres: { condition: service_healthy }
      qdrant: { condition: service_healthy }
      redis: { condition: service_healthy }

  siem-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    command: ["npm", "run", "worker:siem"]
    env_file: ${APP_ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql://cyberrakshak:${POSTGRES_PASSWORD}@postgres:5432/cyberrakshak?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

volumes:
  postgres-data:
  qdrant-data:
  redis-data:
